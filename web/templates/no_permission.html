{% extends 'layout.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; height: 60vh;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%;">
        
        <div style="font-size: 60px; color: #f87171; margin-bottom: 20px;">
            <i class="fas fa-lock"></i>
        </div>
        
        <h2 style="color: #1f2937; margin-bottom: 10px; font-size: 24px;">访问受限</h2>
        
        <p style="color: #6b7280; margin-bottom: 25px; line-height: 1.5;">
            {{ msg|default:"抱歉，您当前的账号角色没有权限访问该页面。" }}
        </p>
        
        <a href="/level/list/" style="display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-weight: 500; transition: transform 0.3s;">
            返回安全区域
        </a>
    </div>
</div>
{% endblock %}
