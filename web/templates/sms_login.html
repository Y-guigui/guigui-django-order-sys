<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短信登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- 错误提示框样式 (新增) --- */
        .alert-error {
            background-color: #fef2f2;
            border: 1px solid #f87171;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        /* -------------------------- */

        .role-toggle-group {
            display: flex;
            background-color: rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 5px;
        }

        .role-option {
            flex: 1;
            position: relative;
        }

        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            margin: 0;
            cursor: pointer;
            z-index: 2;
        }

        .role-option label {
            display: block;
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 500;
            color: #6b7280;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .role-option input[type="radio"]:checked + label {
            background-color: #ffffff;
            color: #1f2937;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            font-weight: 600;
        }

        .login-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
            color: #1f2937;
        }

        .form-control::placeholder {
            color: #9ca3af;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .mobile-wrapper {
            position: relative;
        }

        .mobile-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
            z-index: 2;
        }

        .mobile-input {
             padding: 14px 120px 14px 45px;
        }

        .btn-get-code {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #eef2ff;
            color: #667eea;
            border: 1px solid #c7d2fe;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .btn-get-code:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .bottom-links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
            color: #667eea;
            font-size: 14px;
        }

        .bottom-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .bottom-links a:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form id="loginForm">
            {% csrf_token %}

            <div class="role-toggle-group">
                <div class="role-option">
                    <input type="radio" id="sms_role_admin" name="role" value="1" required
                           oninvalid="this.setCustomValidity('请选择您的身份')"
                           onchange="document.getElementsByName('role').forEach(function(e){e.setCustomValidity('')})">
                    <label for="sms_role_admin">管理员</label>
                </div>
                <div class="role-option">
                    <input type="radio" id="sms_role_customer" name="role" value="2" required
                           oninvalid="this.setCustomValidity('请选择您的身份')"
                           onchange="document.getElementsByName('role').forEach(function(e){e.setCustomValidity('')})">
                    <label for="sms_role_customer">客户</label>
                </div>
            </div>

            <div class="login-header">
                <h1>验证码登录</h1>
                <p>请输入手机号获取验证码继续访问</p>
            </div>

            {% if error %}
                <div class="alert-error">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
            {% endif %}

            <div class="form-group">
                <label for="mobile">手机号</label>
                <div class="mobile-wrapper input-wrapper">
                    <i class="fas fa-mobile-alt"></i>
                    <input type="tel"
                           id="mobile"
                           name="mobile"
                           class="form-control mobile-input"
                           placeholder="请输入手机号"
                           required
                           oninvalid="this.setCustomValidity('手机号不能为空')"
                           oninput="this.setCustomValidity('')">
                    <button type="button" class="btn-get-code" id="getCodeBtn">获取验证码</button>
                </div>
            </div>

            <div class="form-group">
                <label for="code">验证码</label>
                <div class="input-wrapper">
                    <i class="fas fa-shield-alt"></i>
                    <input type="text"
                           id="code"
                           name="code"
                           class="form-control"
                           placeholder="请输入验证码"
                           required
                           oninvalid="this.setCustomValidity('验证码不能为空')"
                           oninput="this.setCustomValidity('')">
                </div>
            </div>

            <button type="button" class="btn-login" id="btnLogin">立即登录</button>

            <div class="bottom-links">
                <a href="{% url 'login' %}">← 返回密码登录</a>
            </div>
        </form>
    </div>

    <script>
    // =========================================================
    // 第一部分：监听“获取验证码”按钮
    // =========================================================
    $('#getCodeBtn').click(function () {
        var mobileNumber = $('#mobile').val();
        var btn = $(this);

        if (!mobileNumber) {
            alert('亲，请先输入手机号！');
            return;
        }

        $.ajax({
            url: '/sms/send/',
            type: 'GET',
            data: { mobile: mobileNumber },
            dataType: 'JSON',
            success: function (res) {
                if (res.status) {
                    // 发送成功，开始读秒
                    let count = 60;
                    btn.prop('disabled', true);
                    btn.text(`${count}s后重试`);

                    const timer = setInterval(() => {
                        count--;
                        if (count <= 0) {
                            clearInterval(timer);
                            btn.prop('disabled', false);
                            btn.text('获取验证码');
                        } else {
                            btn.text(`${count}s后重试`);
                        }
                    }, 1000);
                } else {
                    // 发送失败，弹出后端错误
                    alert(res.error);
                }
            }
        });
    });

    // =========================================================
    // 第二部分：新增的监听“立即登录”按钮
    // =========================================================
    $('#btnLogin').click(function () {

        // serialize()
        var formData = $('#loginForm').serialize();

        $.ajax({
            url: '/sms/login/',  // 发给后端 sms_login 函数处理
            type: 'POST',        // 登录用 POST 更安全
            data: formData,      // 把上面打包好的数据发过去
            dataType: 'JSON',
            success: function (res) {
                if (res.status) {
                    // 后端验证通过，并且给了跳转链接，前端用 JS 控制页面跳转到后台
                    window.location.href = res.redirect_url;
                } else {
                    // 后端验证失败（比如验证码填错了），弹出错误提示
                    // 重点：这时候页面绝对不会刷新，你的倒计时还在继续跑！
                    alert(res.error);
                }
            }
        });
    });
</script>
</body>
</html>
