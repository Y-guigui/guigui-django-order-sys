{% extends 'layout.html' %}

{% block content %}
    <style>
        /* =========================================
           绝对不要写 * 和 body 的样式，防止污染母版！
           ========================================= */

        /* 用一个局部容器来代替以前的 body，实现卡片水平居中 */
        .form-wrapper {
            display: flex;
            justify-content: center;
            padding: 30px 0;
        }

        /* 表单卡片容器 */
        .form-card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 500px; /* 限制卡片最大宽度，看起来更紧凑 */
            border: 1px solid #f3f4f6;
        }

        .card-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f3f4f6;
        }

        .card-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #111827;
        }

        /* 统一输入框区域样式 */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        /* 直接拦截 Django 生成的 input 标签，赋予高颜值样式 */
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            color: #1f2937;
            background-color: #f9fafb;
        }

        /* 鼠标点进输入框时的发光效果 */
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 错误提示文字 */
        .error-msg {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            display: block;
        }

        /* 底部按钮组：左右平分 */
        .action-footer {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border: none;
            display: inline-block;
        }

        /* 提交按钮：紫蓝渐变 */
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.25);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.35);
        }

        /* 返回按钮：低调灰色 */
        .btn-back {
            background-color: #f3f4f6;
            color: #4b5563;
        }

        .btn-back:hover {
            background-color: #e5e7eb;
            color: #1f2937;
        }
    </style>

    <div class="form-wrapper">
        <div class="form-card">
            
            <div class="card-header">
                <h2><i class="fas fa-plus-circle" style="color: #667eea; margin-right: 8px;"></i>新建级别</h2>
            </div>

            <form method="post" action="" novalidate>
                {% csrf_token %}

                <div class="form-group">
                    <label>级别名称</label>
                    {{ form.title }}
                    <span class="error-msg">{{ form.title.errors.0 }}</span>
                </div>

                <div class="form-group">
                    <label>折扣 (%)</label>
                    {{ form.percent }}
                    <span class="error-msg">{{ form.percent.errors.0 }}</span>
                </div>

                <div class="action-footer">
                    <a href="/level/list/" class="btn btn-back">返回列表</a>
                    <button type="submit" class="btn btn-submit">确认保存</button>
                </div>
            </form>
            
        </div>
    </div>
{% endblock %}
